<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inefficiency Generator — CCC</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://use.typekit.net/uzw1dvl.css"/>
  <style>
    a {
      position: fixed;
      top: 28px;
      left: 32px;
      font-size: 13px;
      color: #1f1e1e;
      text-decoration: none;
    }
    a:hover { color: #555; }
  </style>
</head>
<body>
  <a href="index.html">← Experiments</a>
  <h1>Inefficiency Generator</h1>
  <div class="card">
    <input type="hidden" id="timeInput" value="00:00"/>
    <svg id="clock" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="70" fill="none" stroke="pink"/>
      <g id="numbers"></g>
      <line id="hand" x1="100" y1="100" x2="100" y2="30" class="hand"/>
      <circle cx="100" cy="100" r="4" class="center"/>
    </svg>
    <div class="time-display" id="display">Selected: 00:00</div>
    <button id="generateBtn">Generate</button>
    <h2 id="result"></h2>
  </div>
  <script src="/js/i-gen.js"></script>
</body>
</html>
