<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playing with time — CCC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffff00;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    header {
      position: fixed;
      top: 22px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      color: #000;
    }
    header img {
      width: 30px;
      height: 30px;
    }
    footer {
      position: fixed;
      bottom: 22px;
      right: 24px;
      font-size: 15px;
      color: #000;
    }
    canvas { display: block; }
    #thumb {
      position: fixed;
      display: none;
      pointer-events: none;
      width: 200px;
    }
    #info-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 64px;
      font-size: 20px;
      line-height: 1.5;
      color: #000;
      transform: translateY(100%);
      transition: transform 0.35s ease;
    }
    #info-banner.visible { transform: translateY(0); }
  </style>
</head>
<body>
  <header>
    Playing with time
    <img src="img/clock.png" alt="clock"/>
  </header>

  <canvas id="c"></canvas>
  <img id="thumb" src="" alt=""/>

  <footer id="footer">Project Title &nbsp;|&nbsp; Name Surname</footer>

  <div id="info-banner">
    <p>A co-created interactive experiment<br>around the theme of playing with time.</p>
    <p>Developed during <a href="https://cursormag.net/" target="_blank" style="color:#000;">CURSOR MAG ↗</a><br>Creative Coding Camp</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const footer = document.getElementById('footer');
    const infoBanner = document.getElementById('info-banner');
    const thumbEl = document.getElementById('thumb');

    let bannerPinned = false;
    const headerEl = document.querySelector('header');

    headerEl.addEventListener('mouseenter', () => infoBanner.classList.add('visible'));
    headerEl.addEventListener('mouseleave', () => { if (!bannerPinned) infoBanner.classList.remove('visible'); });
    headerEl.addEventListener('click', () => {
      bannerPinned = !bannerPinned;
      infoBanner.classList.toggle('visible', bannerPinned);
    });

    const projects = [
      { num: 1, href: 'hms.html',        title: 'HOURS MINUTES SECONDS', name: 'Caoimhe Gallahue',    thumb: 'img/thumb-hms.png' },
      { num: 2, href: 'play-clock.html', title: 'Play Clock',             name: 'Caoimhe Gallahue',    thumb: 'img/thumb-play-clock.png' },
      { num: 3, href: 'i-gen.html',      title: 'Inefficiency Generator', name: 'Meike Lips, Eli Ehlers', thumb: 'img/thumb-ig.png' },
    ];

    const defaultByline = 'Project Title  |  Name Surname';

    const N = 8;
    let circles = [];
    let hovered = -1;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      buildCircles();
      draw();
    }

    function buildCircles() {
      const cx   = canvas.width  / 2;
      const cy   = canvas.height / 2;
      const ring = Math.min(canvas.width, canvas.height) * 0.30;
      const r    = Math.min(canvas.width, canvas.height) * 0.055;
      circles = Array.from({ length: N }, (_, i) => {
        const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
        return {
          x: cx + ring * Math.cos(angle),
          y: cy + ring * Math.sin(angle),
          r,
          project: i < projects.length ? projects[i] : null,
        };
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      circles.forEach((c, i) => {
        const r = i === hovered ? c.r * 1.18 : c.r;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
        ctx.fill();

        if (c.project && i === hovered) {
          ctx.fillStyle = '#ffff00';
          ctx.font = `bold ${r * 0.9}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(c.project.num, c.x, c.y);
        }
      });
    }

    canvas.addEventListener('mousemove', e => {
      const mx = e.clientX, my = e.clientY;
      let found = -1;
      circles.forEach((c, i) => {
        if (Math.hypot(mx - c.x, my - c.y) <= c.r * 1.4) found = i;
      });

      if (found !== hovered) {
        hovered = found;
        draw();
        const proj = found >= 0 ? circles[found].project : null;
        footer.textContent = proj ? `${proj.title}  |  ${proj.name}` : defaultByline;
        canvas.style.cursor = proj ? 'pointer' : 'default';
        if (proj) {
          const c = circles[found];
          const cx = canvas.width / 2, cy = canvas.height / 2;
          const dx = c.x - cx, dy = c.y - cy;
          const len = Math.hypot(dx, dy) || 1;
          const offset = c.r * 2.5;
          thumbEl.src = proj.thumb;
          thumbEl.style.display = 'block';
          thumbEl.style.left = (c.x + (dx / len) * offset) + 'px';
          thumbEl.style.top  = (c.y + (dy / len) * offset) + 'px';
        } else {
          thumbEl.style.display = 'none';
        }
      }
    });

    canvas.addEventListener('mouseleave', () => {
      hovered = -1;
      draw();
      footer.textContent = defaultByline;
      canvas.style.cursor = 'default';
      thumbEl.style.display = 'none';
    });

    canvas.addEventListener('click', () => {
      if (hovered >= 0 && circles[hovered].project) {
        window.location.href = circles[hovered].project.href;
      }
    });

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
