<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Growing Circle Clock — CCC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    #growing-circle-clock canvas { display: block; }
    a {
      position: fixed;
      top: 28px;
      left: 32px;
      font-size: 13px;
      color: #b1b0b0;
      text-decoration: none;
    }
    a:hover { color: #555; }
  </style>
</head>
<body>
  <a href="../index.html">← Experiments</a>
  <div id="growing-circle-clock"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <script src="/js/circle-clock.js"></script>
</body>
</html>
